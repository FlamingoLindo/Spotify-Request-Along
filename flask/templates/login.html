<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="keywords"
      content="Twitch, Spotify, Python, Flask, Oauth2, Requests, API"
    />
    <meta name="author" content="https://github.com/FlamingoLindo" />
    <meta name="description" content="Login to Request Along" />

    <link
      rel="stylesheet"
      href="{{url_for('static',filename='styles/login.css')}}"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{{url_for('static',filename='buh.ico')}}"
    />

    <title>Login - Request Along</title>
  </head>

  <body>
    <main class="page">
      <div class="login-container">
        <h1>Login</h1>
        
        {% if error %}
        <div class="error-message">
          {{ error }}
        </div>
        {% endif %}
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message {{ category }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="{{ url_for('auth.login') }}" method="POST" class="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input 
              type="text" 
              id="username" 
              name="username" 
              placeholder="Enter your username" 
              required 
              autofocus
            />
          </div>
          
          <div class="form-group">
            <label for="password">Password:</label>
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password" 
              required 
            />
          </div>
          
          <button type="submit" class="login-button">Login</button>
        </form>
    </main>
  </body>
</html>
